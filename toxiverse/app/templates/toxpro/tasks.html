{% extends "base.html" %}
{% block content %}

<!-- Hero -->
<section class="hero">
  <div class="container">
    <div class="tv-card p-4 p-md-5">
      <div class="section-title mb-3">
        <span class="dot"></span> Tasks
      </div>
      <p class="mb-0 subtle">
        Monitor the status of background jobs for chemical curation and QSAR model building.
        This table refreshes automatically every 5 seconds.
      </p>
    </div>
  </div>
</section>

<!-- Task Table -->
<section class="py-5">
  <div class="container">
    <div class="tv-card p-0" style="max-height: 600px; overflow:auto;">
      <div class="feature-table">
        <div class="thead">Task Queue</div>
        <div id="task-table">
          {% include 'toxpro/_task_table.html' %}
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  // Auto-refresh task table every 5 seconds
  setInterval(() => {
    fetch("{{ url_for('cheminf.task_table_partial') }}")
      .then(response => response.text())
      .then(html => {
        const container = document.getElementById('task-table');
        if (container) container.innerHTML = html;
      });
  }, 5000);
</script>

{% endblock %}
